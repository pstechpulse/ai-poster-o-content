name: Ultimate Content Engine SOTA
on:
  schedule:
    - cron: '0 3 * * *'  # 8:30 AM IST
    - cron: '0 10 * * *' # 3:30 PM IST
    - cron: '0 16 * * *' # 9:30 PM IST
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-liberation libnss3-dev libatk-bridge2.0-0 libxkbcommon0 libgbm-dev
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install PyDeps
        run: |
          pip install google-genai edge-tts requests instagrapi 
          pip install google-api-python-client google-auth-oauthlib playwright
          playwright install chromium
      - name: Run Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          INSTA_SESSION_JSON: ${{ secrets.INSTA_SESSION_JSON }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
        
